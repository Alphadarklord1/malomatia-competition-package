# Copy this file to `.streamlit/secrets.toml` and replace hashes.
# Password hashes must be stored as:
# pbkdf2_sha256$<iterations>$<salt_base64>$<digest_base64>

[auth_users.operator_demo]
role = "operator"
display_name = "Operator Demo"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"
# Optional: Base32 TOTP secret for 2-step verification on local accounts.
totp_secret = "JBSWY3DPEHPK3PXP"

[auth_users.supervisor_demo]
role = "supervisor"
display_name = "Supervisor Demo"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"
totp_secret = "KRSXG5DSNFXGOIDB"

[auth_users.auditor_demo]
role = "auditor"
display_name = "Auditor Demo"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"
totp_secret = "MFRGGZDFMZTWQ2LK"

[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "REPLACE_WITH_RANDOM_LONG_COOKIE_SECRET"

[auth.google]
client_id = "GOOGLE_CLIENT_ID"
client_secret = "GOOGLE_CLIENT_SECRET"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

[auth.microsoft]
client_id = "MICROSOFT_CLIENT_ID"
client_secret = "MICROSOFT_CLIENT_SECRET"
server_metadata_url = "https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration"

[oidc_roles]
supervisors = ["supervisor@example.com"]
auditors = ["auditor@example.com"]

# Optional salt for event hashing in audit chain integrity checks.
audit_signing_salt = "REPLACE_WITH_RANDOM_LONG_STRING"

# Optional: enables full AI mode in Knowledge Assistant (semantic rerank + grounded LLM answer).
openai_api_key = "sk-REPLACE"
openai_model = "gpt-4o-mini"
openai_embedding_model = "text-embedding-3-small"
