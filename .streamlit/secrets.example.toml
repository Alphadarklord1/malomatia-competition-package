# Copy this file to `.streamlit/secrets.toml` and replace hashes.
# Password hashes must be stored as:
# pbkdf2_sha256$<iterations>$<salt_base64>$<digest_base64>

[auth_users.operator_demo]
role = "operator"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"

[auth_users.supervisor_demo]
role = "supervisor"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"

[auth_users.auditor_demo]
role = "auditor"
password_hash = "pbkdf2_sha256$210000$REPLACE_SALT_BASE64$REPLACE_DIGEST_BASE64"

# Optional salt for event hashing in audit chain integrity checks.
audit_signing_salt = "REPLACE_WITH_RANDOM_LONG_STRING"

# Optional: enables full AI mode in Knowledge Assistant (semantic rerank + grounded LLM answer).
openai_api_key = "sk-REPLACE"
openai_model = "gpt-4o-mini"
openai_embedding_model = "text-embedding-3-small"
