# Copy this file to `.streamlit/secrets.toml` and replace hashes.
# Password hashes must be stored as:
# pbkdf2_sha256$<iterations>$<salt_base64>$<digest_base64>

# Demo credentials (passwords listed in README):
#   operator_demo  / Operator@123
#   supervisor_demo / Supervisor@123
#   auditor_demo   / Auditor@123

[auth_users.operator_demo]
