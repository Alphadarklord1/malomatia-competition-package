name: CI Smoke

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ui.txt

      - name: Compile
        run: |
          python -m py_compile gov_triage_dashboard.py storage.py kpi.py workflow.py validation_smoke.py

      - name: Pytest
        run: |
          python -m pytest -q

      - name: Validation smoke
        run: |
          chmod +x ./run_validation.sh
          ./run_validation.sh
